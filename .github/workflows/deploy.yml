name: Auto Translate and Deploy

on:
  push:
    branches: [ main, master, production ]
    paths:
      - 'content/zh/posts/**'
      - 'content/en/posts/**'
      - 'content/ja/posts/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.ts'
      - 'contentlayer.config.ts'
  pull_request:
    branches: [ main, master, production ]
    paths:
      - 'content/zh/posts/**'
      - 'content/en/posts/**'
      - 'content/ja/posts/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.ts'
      - 'contentlayer.config.ts'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build (ignore file change detection)'
        required: false
        default: false
        type: boolean
      redeploy_only:
        description: 'Redeploy only (skip auto-translation)'
        required: false
        default: false
        type: boolean
      deployment_environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' || 
      github.ref == 'refs/heads/master' || 
      github.ref == 'refs/heads/production' ||
      github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.0'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.0

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run translation (generate all language versions)
      run: |
        echo "🌐 Generating translations for all articles..."
        pnpm run translate:free -- --all
        echo "✅ Translation completed"

    - name: Build Contentlayer
      run: pnpm run contentlayer
      
    - name: Build Next.js
      run: pnpm run build

    - name: Set deployment environment
      id: set-env
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "environment=${{ github.event.inputs.deployment_environment }}" >> $GITHUB_OUTPUT
        else
          echo "environment=production" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: ${{ steps.set-env.outputs.environment == 'production' && '--prod' || '--prebuilt' }}
        working-directory: ./

