name: Deploy

on:
  push:
    branches: [ main, master, production ]
    paths:
      - 'apps/web/src/**'
      - 'apps/web/package.json'
      - 'apps/web/next.config.ts'
      - 'apps/web/postcss.config.mjs'
      - 'apps/web/vercel.json'
      - 'apps/web/src/app/globals.css'
      - 'apps/backend/**'
      - 'api/**'
      - 'requirements.txt'
      - 'runtime.txt'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ main, master, production ]
    paths:
      - 'apps/web/src/**'
      - 'apps/web/package.json'
      - 'apps/web/next.config.ts'
      - 'apps/web/postcss.config.mjs'
      - 'apps/web/vercel.json'
      - 'apps/web/src/app/globals.css'
      - 'apps/backend/**'
      - 'api/**'
      - 'requirements.txt'
      - 'runtime.txt'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build (ignore file change detection)'
        required: false
        default: false
        type: boolean
      deployment_environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.0'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          apps/backend/pyproject.toml
          requirements.txt

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.0

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install backend dependencies
      run: pnpm api:setup

    - name: Install uv for Vercel Python build
      run: python -m pip install uv

    - name: Check backend
      run: pnpm api:check

    - name: Check frontend
      run: pnpm web:check

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: checks
    if: |
      github.ref == 'refs/heads/main' || 
      github.ref == 'refs/heads/master' || 
      github.ref == 'refs/heads/production' ||
      github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.0'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: |
          apps/backend/pyproject.toml
          requirements.txt

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.0

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install backend dependencies
      run: pnpm api:setup

    - name: Install uv for Vercel Python build
      run: python -m pip install uv

    - name: Check backend
      run: pnpm api:check

    - name: Check frontend
      run: pnpm web:check
      
    - name: Build Next.js
      run: pnpm --filter @nextblog/web build

    - name: Set deployment environment
      id: set-env
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "environment=${{ github.event.inputs.deployment_environment }}" >> $GITHUB_OUTPUT
        else
          echo "environment=production" >> $GITHUB_OUTPUT
        fi

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel environment
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        if [ "${{ steps.set-env.outputs.environment }}" = "production" ]; then
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        else
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        fi

    - name: Deploy to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        if [ "${{ steps.set-env.outputs.environment }}" = "production" ]; then
          vercel deploy --prod --token="$VERCEL_TOKEN"
        else
          vercel deploy --token="$VERCEL_TOKEN"
        fi
