name: Auto Translate and Deploy

on:
  push:
    branches: [ main, master, production ]
    paths:
      - 'apps/web/content/zh/posts/**'
      - 'apps/web/content/en/posts/**'
      - 'apps/web/content/ja/posts/**'
      - 'apps/web/src/**'
      - 'apps/web/package.json'
      - 'apps/web/next.config.ts'
      - 'apps/web/postcss.config.mjs'
      - 'apps/web/contentlayer.config.ts'
      - 'apps/web/src/app/globals.css'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ main, master, production ]
    paths:
      - 'apps/web/content/zh/posts/**'
      - 'apps/web/content/en/posts/**'
      - 'apps/web/content/ja/posts/**'
      - 'apps/web/src/**'
      - 'apps/web/package.json'
      - 'apps/web/next.config.ts'
      - 'apps/web/postcss.config.mjs'
      - 'apps/web/contentlayer.config.ts'
      - 'apps/web/src/app/globals.css'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build (ignore file change detection)'
        required: false
        default: false
        type: boolean
      redeploy_only:
        description: 'Redeploy only (skip auto-translation)'
        required: false
        default: false
        type: boolean
      deployment_environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' || 
      github.ref == 'refs/heads/master' || 
      github.ref == 'refs/heads/production' ||
      github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.0'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.0

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run translation (generate all language versions)
      working-directory: apps/web
      run: |
        echo "🌐 Generating translations for all articles..."
        pnpm run translate -- --all
        echo "✅ Translation completed"

    - name: Build Contentlayer
      run: pnpm --filter @nextblog/web contentlayer
      
    - name: Build Next.js
      run: pnpm --filter @nextblog/web build

    - name: Set deployment environment
      id: set-env
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "environment=${{ github.event.inputs.deployment_environment }}" >> $GITHUB_OUTPUT
        else
          echo "environment=production" >> $GITHUB_OUTPUT
        fi

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Pull Vercel environment
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        if [ "${{ steps.set-env.outputs.environment }}" = "production" ]; then
          vercel pull --cwd apps/web --yes --environment=production --token="$VERCEL_TOKEN"
        else
          vercel pull --cwd apps/web --yes --environment=preview --token="$VERCEL_TOKEN"
        fi

    - name: Deploy to Vercel
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      run: |
        if [ "${{ steps.set-env.outputs.environment }}" = "production" ]; then
          vercel deploy --cwd apps/web --prod --token="$VERCEL_TOKEN"
        else
          vercel deploy --cwd apps/web --token="$VERCEL_TOKEN"
        fi
