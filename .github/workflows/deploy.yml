name: Auto Translate and Deploy

on:
  push:
    branches: [ main, master, production ]
    paths:
      - 'content/zh/posts/**'
      - 'content/en/posts/**'
      - 'content/ja/posts/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.ts'
      - 'contentlayer.config.ts'
  pull_request:
    branches: [ main, master, production ]
    paths:
      - 'content/zh/posts/**'
      - 'content/en/posts/**'
      - 'content/ja/posts/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.ts'
      - 'contentlayer.config.ts'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build (ignore file change detection)'
        required: false
        default: false
        type: boolean
      redeploy_only:
        description: 'Redeploy only (skip auto-translation)'
        required: false
        default: false
        type: boolean
      deployment_environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  auto-translate:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.redeploy_only == 'true')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.18.0'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.17.0

    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Detect new or modified articles
      id: detect-changes
      run: |
        # Get list of changed files
        if [ "${{ github.event_name }}" = "push" ]; then
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
        else
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
        fi
        
        # Detect Chinese article changes
        ZH_CHANGES=$(echo "$CHANGED_FILES" | grep "^content/zh/posts/" || true)
        EN_CHANGES=$(echo "$CHANGED_FILES" | grep "^content/en/posts/" || true)
        JA_CHANGES=$(echo "$CHANGED_FILES" | grep "^content/ja/posts/" || true)
        
        echo "zh_changes=$ZH_CHANGES" >> $GITHUB_OUTPUT
        echo "en_changes=$EN_CHANGES" >> $GITHUB_OUTPUT
        echo "ja_changes=$JA_CHANGES" >> $GITHUB_OUTPUT
        
        # Determine translation direction
        if [ -n "$ZH_CHANGES" ]; then
          echo "translate_from=zh" >> $GITHUB_OUTPUT
          echo "translate_to=en,ja" >> $GITHUB_OUTPUT
        elif [ -n "$EN_CHANGES" ]; then
          echo "translate_from=en" >> $GITHUB_OUTPUT
          echo "translate_to=zh,ja" >> $GITHUB_OUTPUT
        elif [ -n "$JA_CHANGES" ]; then
          echo "translate_from=ja" >> $GITHUB_OUTPUT
          echo "translate_to=zh,en" >> $GITHUB_OUTPUT
        fi

    - name: Run auto translation
      if: steps.detect-changes.outputs.translate_from != ''
      run: |
        echo "Detected article changes in ${{ steps.detect-changes.outputs.translate_from }} language"
        echo "Will translate to: ${{ steps.detect-changes.outputs.translate_to }}"
        pnpm run translate

    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Check if translation files need to be committed
      id: check-changes
      run: |
        if git diff --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit translation files
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        git add content/en/posts/ content/ja/posts/
        git commit -m "🤖 Auto translate: from ${{ steps.detect-changes.outputs.translate_from }} to ${{ steps.detect-changes.outputs.translate_to }}"
        git push

  redeploy-only:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.redeploy_only == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Contentlayer
        run: pnpm run contentlayer

      - name: Set deployment environment
        id: set-env
        run: |
          echo "environment=${{ github.event.inputs.deployment_environment }}" >> $GITHUB_OUTPUT

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          github-deployment: false
          vercel-args: |
            --yes 
            ${{ steps.set-env.outputs.environment == 'production' && '--prod' || '--prebuilt' }}
          working-directory: ./

  deploy-to-vercel:
    runs-on: ubuntu-latest
    needs: auto-translate
    if: |
      github.ref == 'refs/heads/main' || 
      github.ref == 'refs/heads/master' || 
      github.ref == 'refs/heads/production' ||
      github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Contentlayer
        run: pnpm run contentlayer

      - name: Set deployment environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.deployment_environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          github-deployment: false
          vercel-args: |
            --yes 
            ${{ steps.set-env.outputs.environment == 'production' && '--prod' || '--prebuilt' }}
          working-directory: ./
